##### Terminal #####
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB,clipboard,extkeys"
set -as terminal-features ",ghostty:RGB,clipboard,extkeys"
set -g focus-events on
set -g set-clipboard on

##### Core Behavior #####
set -g history-limit 200000
set -g mouse on
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g status-keys vi
set -sg escape-time 10
set -g repeat-time 300
set -g default-shell "${SHELL}"
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @yank_selection 'clipboard'

##### Prefix #####
unbind C-b
set -g prefix `
bind ` send-prefix

##### Windows And Panes #####
bind c new-window -c "#{pane_current_path}"
bind C new-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
unbind '"'
bind x kill-pane
bind q kill-window
bind f resize-pane -Z
bind ! break-pane -d
bind @ join-pane -s !
bind z choose-tree -Zw
bind s choose-session
bind S command-prompt -p "New session name" "new-session -A -s '%%'"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

##### Navigation #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind Tab last-window
bind n next-window
bind p previous-window
bind Space select-layout even-horizontal
bind Enter select-layout main-vertical

##### Prefixless Window Jumps #####
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

##### Copy Mode #####
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi / command-prompt -p "search down" "send -X search-forward \"%%\""
bind -T copy-mode-vi ? command-prompt -p "search up" "send -X search-backward \"%%\""

if-shell 'test "$(uname)" = "Darwin"' {
  bind y run-shell 'tmux save-buffer - | pbcopy' \; display-message "Copied to macOS clipboard"
}

##### Quality Of Life #####
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

bind m set -g mouse on \; display-message "Mouse: ON"
bind M set -g mouse off \; display-message "Mouse: OFF"
bind * setw synchronize-panes on \; display-message "Sync panes: ON"
bind / setw synchronize-panes off \; display-message "Sync panes: OFF"
bind C-l send-keys C-l \; clear-history
bind P pipe-pane -o "cat >>~/#W.log" \; display-message "Pane logging toggled"
bind o display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "${SHELL}"

##### Status #####
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "bg=default,fg=colour245"
set -g message-style "bg=colour236,fg=colour223"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour111"
set -g status-left "#[bold] #S "
set -g status-right "#[fg=colour245]#{?client_prefix,#[fg=colour203]PREFIX ,}#{pane_current_command} #[fg=colour245]%Y-%m-%d %H:%M"

##### TPM #####
run '~/.tmux/plugins/tpm/tpm'
